# Constellation Pi5 — minimal lighttpd reverse-proxy config
# Routes:
#   /iot/*, /gt/*, /proto/*  →  agristar-bridge on 127.0.0.1:9001  (REST + WS)
#   everything else          →  ui-svelte (node)  on 127.0.0.1:3000

server.modules = (
  "mod_proxy",
  "mod_accesslog",
)

server.document-root        = "/var/www/html"
server.upload-dirs          = ( "/var/cache/lighttpd/uploads" )
server.errorlog             = "/var/log/lighttpd/error.log"
server.pid-file             = "/run/lighttpd.pid"
server.username             = "www-data"
server.groupname            = "www-data"
server.port                 = 80

accesslog.filename          = "/var/log/lighttpd/access.log"

index-file.names            = ( "index.html" )
url.access-deny             = ( "~", ".inc" )
static-file.exclude-extensions = ( ".php", ".pl", ".fcgi" )

# Bridge endpoints (REST + WebSocket).
$HTTP["url"] =~ "^/(iot|gt|proto)" {
  proxy.server = ( "" => ( ( "host" => "127.0.0.1", "port" => 9001 ) ) )
  proxy.header = ( "upgrade" => "enable" )
}

# Everything else → SvelteKit UI.
$HTTP["url"] !~ "^/(iot|gt|proto)" {
  proxy.server = ( "" => ( ( "host" => "127.0.0.1", "port" => 3000 ) ) )
  proxy.header = ( "upgrade" => "enable" )
}
