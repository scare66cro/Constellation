# Flash SBL OSPI bootloader + Constellation Nova for LP-AM2434 (Pi-side paths)

--flash-writer=sbl_prebuilt/am243x-lp/sbl_uart_uniflash.release.hs_fs.tiimage

# Program the OSPI PHY tuning attack vector
--operation=flash-phy-tuning-data

# Bootloader at offset 0x0
--file=sbl_prebuilt/am243x-lp/sbl_ospi.release.hs_fs.tiimage --operation=flash --flash-offset=0x0

# Nova LP application at offset 0x80000
--file=nova_lp.release.mcelf.hs_fs --operation=flash --flash-offset=0x80000
