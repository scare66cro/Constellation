# Drop-in for agristar-bridge.service that lets the bridge invoke the
# narrow-scoped /usr/local/sbin/apply-network-config helper via sudo.
#
# Installed to:
#   /etc/systemd/system/agristar-bridge.service.d/allow-net-helper.conf
#
# Background — why this exists
# ----------------------------
# The original Pi5 bridge unit had heavy hardening (NoNewPrivileges=true
# plus six other directives that implicitly force NNP=yes under systemd's
# "most restrictive wins" rule). NNP blocks ALL setuid escalation including
# sudo, which broke the bridge's POST /iot/tcpip handler — that handler
# needs to invoke nmcli + reboot to actually move eth0 to the operator's
# new IP. The legacy iotclient.service had ZERO hardening, which is why
# the previous iteration of this page "just worked".
#
# Drop-in vs main-unit edit
# -------------------------
# IMPORTANT: systemd 252 (Debian bookworm) treats NoNewPrivileges as
# MONOTONIC at the main unit level — if the main unit sets any NNP-
# implying directive to a "restrictive" value, a drop-in setting it back
# to "permissive" does NOT clear the kernel-level prctl. The fix has to
# happen in the MAIN unit file. This drop-in is now a *belt-and-suspenders*
# layer for cases where the main unit is freshly redeployed with the
# legacy hardening still in place.
#
# For the production install path:
#   - install.sh / package_production.sh ship a main unit that already
#     OMITS the NNP-implying directives.
#   - This drop-in is also installed, so the safety net is in place if
#     someone manually re-adds the directives later.
#
# Directives that imply NNP (and are therefore neutralized here):
#     NoNewPrivileges       — explicit
#     SystemCallArchitectures
#     LockPersonality
#     ProtectKernelTunables
#     ProtectKernelModules
#     RestrictSUIDSGID
#     RestrictRealtime      — undocumented in man systemd.exec(5), but
#                              empirically forces NNP=1 on systemd 252;
#                              isolated via bisect 2026-06-02.
#
# Hardening that STAYS in force (the bridge sandbox is mostly intact):
#     PrivateTmp=true            (private /tmp)
#     ProtectSystem=full         (/etc, /usr, /boot read-only)
#     ProtectHome=read-only      (/home, /root read-only)
#     ProtectControlGroups=true  (cgroup fs read-only)
#     ReadWritePaths=…           (write-allowlist for the bridge)
#     MemoryMax=512M             (resource cap)
#     User=gellert               (no root by default)
#
# The privileged surface narrows to ONE binary the bridge can invoke via
# sudo: /usr/local/sbin/apply-network-config, which validates every
# argument (IPv4 dotted quad, CIDR range, DNS list) before touching
# nmcli. Sudoers grants gellert NOPASSWD ONLY over that helper
# (/etc/sudoers.d/agristar-network).
#
# To revert: delete this file + `systemctl daemon-reload + restart`.
[Service]
NoNewPrivileges=false
LockPersonality=false
ProtectKernelTunables=false
ProtectKernelModules=false
RestrictSUIDSGID=false
RestrictRealtime=false
SystemCallArchitectures=
