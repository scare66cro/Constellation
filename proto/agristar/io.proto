// ═══════════════════════════════════════════════════════════════════════════
// io.proto — I/O configuration, definitions, analog boards, available IO
// Maps to: UI_SendIoConfig, UI_SendIoDefinition, UI_SendAnalogBoard,
//          UI_SendAvailableIo, StoreIoConfig, StoreIoName
// ═══════════════════════════════════════════════════════════════════════════
syntax = "proto3";
package agristar;

// ─── IoConfig — equipment → port mapping (UI_SendIoConfig) ──────────────
// Wire layout (per Nova_Firmware nova_messages.c::NovaMsg_SendIoConfig):
//   output_map[eqIdx] = port id assigned to equipment eqIdx
//   input_map[eqIdx]  = port id assigned to equipment eqIdx
// i.e. the array is **eq-indexed**, value = portId. Consumers that need a
// port-indexed view (e.g. the IoConfig page) invert it client-side.
//
// PID formula: PID = board * 12 + pin + 1  (board 0-based, pin 0-based)
// Legacy: boards 0-2 (36 PIDs). Multi-orbit: boards 0-15 (192 PIDs).
// The array length implicitly encodes the board count.
message IoConfig {
  repeated uint32 output_map = 1;
  repeated uint32 input_map  = 2;
  uint32 board_count         = 3;  // Number of boards (0 = legacy 3-board default)
}

// ─── IoDefinition — full I/O definition list (UI_SendIoDefinition) ───────
// Replaces the MultiMsg-based IoNames system with a single message.
// With 4096-byte max message, all IO entries fit in one shot.
message IoDefinition {
  repeated IoEntry entries = 1;
}

message IoEntry {
  uint32 index       = 1;  // Equipment/IO index
  string name        = 2;  // Human-readable name
  uint32 mode        = 3;  // SYSTEM_MODE category (potato/onion/all/etc.) — legacy EquipIo.Mode
  uint32 io_pin      = 4;  // Physical pin assignment (legacy EquipIo.Output)
  bool   renamable   = 5;  // Whether user can rename this
  bool   visible     = 6;  // Whether shown in UI
  uint32 io_type     = 7;  // IO_OPTION enum: 0=OUTPUT, 1=INPUT, 2=BOTH, 3=SWITCH, 4=NONE
                           // (legacy EquipIo.IO; required because 0 is meaningful → encode with _force)
}

// ─── IoNameUpdate — rename a single I/O (StoreIoName, tag "ioRename") ────
message IoNameUpdate {
  uint32 index    = 1;
  string new_name = 2;
}

// ─── AnalogBoard — sensor board status (UI_SendAnalogBoard) ──────────────
// One per board, sent when browsing boards (NextBoard/PrevBoard).
message AnalogBoard {
  uint32 address   = 1;
  uint32 type      = 2;
  string label     = 3;
  string version   = 4;
  bool   disabled  = 5;
  repeated AnalogSensor sensors = 6;  // Up to 4 sensors per board
}

message AnalogSensor {
  uint32 slot      = 1;   // 0-3
  uint32 type      = 2;   // Sensor type code (5 = 4-20 mA — see display_unit for scaling)
  string label     = 3;
  float  offset    = 4;   // Calibration offset
  bool   disabled  = 5;
  float  value     = 6;   // Current reading (in display_unit when type=5 and eng_max != eng_min)
  // ─── Custom 4-20 mA scaling (Phase: custom-sensor) ────────────────────
  // Only meaningful when type=5 (mA). When eng_min == eng_max (defaults
  // 0/0) firmware reports raw mA. Otherwise:
  //   value = eng_min + (mA - 4) * (eng_max - eng_min) / 16
  // display_unit drives the UI suffix. Add to the enum here and the
  // UI's UnitOptions[] in lockstep.
  //   0 = (none / typed)  1 = %    2 = ppm    3 = inH2O   4 = V
  //   5 = A               6 = CFM  7 = FPM    8 = °F      9 = PSI
  uint32 display_unit = 7;
  float  eng_min      = 8;
  float  eng_max      = 9;
}

// ─── AvailableIo — list of unassigned I/O pins (UI_SendAvailableIo) ──────
message AvailableIo {
  repeated uint32 output_pins = 1;
  repeated uint32 input_pins  = 2;
}
