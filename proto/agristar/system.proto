// ═══════════════════════════════════════════════════════════════════════════
// system.proto — System status, mode, datetime, basic setup, versions
// Maps to: UI_SendMain, UI_SendMode, UI_SendDateTime, UI_SendBasicSetup,
//          UI_SendVersions, UI_SendService
// ═══════════════════════════════════════════════════════════════════════════
syntax = "proto3";
package agristar;

import "agristar/common.proto";

// ─── SystemStatus — the live dashboard (UI_SendMain, tag "main") ─────────
// Pushed every 1s or on change. This is the primary real-time message.
message SystemStatus {
  float  plenum_temp     = 1;   // Current plenum temperature
  float  plenum_humid    = 2;   // Current plenum humidity %
  float  outside_temp    = 3;   // Outside temperature
  float  remote_temp     = 4;   // Remote sensor temperature
  float  outside_humid   = 5;   // Outside humidity %
  float  remote_humid    = 6;   // Remote sensor humidity %
  float  start_temp      = 7;   // Starting/target temperature
  float  return_humid    = 8;   // Return humidity %
  float  return_temp     = 9;   // Return temperature
  float  co2_level       = 10;  // CO2 ppm
  string fan_speed       = 11;  // Fan speed (% or "Manual"/"Off")
  string cool_output     = 12;  // Cooling output description
  string cool_label      = 13;  // Cooling label
  string burner_output   = 14;  // Burner output description
  float  calc_humid      = 15;  // Calculated humidity
  OperatingMode current_mode = 16;
  uint32 cure_state      = 17;  // Burner-cure substate (legacy CureState global,
                                //   CS_OFF=0, CS_AIR=1, CS_MANUAL=2, CS_BURNER=3,
                                //   CS_DEHUMID=4, CS_MOD_DOOR=5, CS_MOD_BURNER=6,
                                //   CS_MOD_BURNER_DOOR_LOCK=7,
                                //   CS_MOD_BURNER_DOOR_UNLOCK=8,
                                //   CS_HOLD_BURNER_MOD_DOOR=9).
                                //   Onion mode only; 0 in potato/standby.
  // Reserved diag fields 18-21 emitted by lp_am2434/main.c::
  // build_system_status_envelope (raw varints from the engine):
  //   18 = SystemState (legacy ST_* enum, 0=ST_UNDEFINED, 28=ST_REFRIG,
  //        33=ST_SHUTDOWN, ...)
  //   19 = RunClockMode() (RC_COOLING=1, RC_RECIRC=2, RC_STANDBY=3,
  //        RC_REFRIG=4, RC_CURE=5)
  //   20 = PWM_DOORS percent  (0..100, 0 = 4 mA endpoint)
  //   21 = PWM_REFRIG percent (0..100, 0 = 4 mA endpoint)
  //   23 = ro_bits (Settings.RemoteOff[] nibbles for FAN/REFRIG/
  //        CLIMACELL/HUMIDIFIER1)
  // These are debug-only; the typed surface is field 22 below.
  uint32 system_state    = 18;  // Engine ST_* enum (raw)
  uint32 run_clock_mode  = 19;  // RC_* enum (raw)
  uint32 pwm_doors_pct   = 20;
  uint32 pwm_refrig_pct  = 21;
  // E-Stop is the ONLY physical input on Constellation. Sourced from
  // STORAGE orbit DI11. Closed = run permitted; open = SHUTDOWN.
  // When asserted, engine drops to ST_SHUTDOWN, all PWMs ramp to
  // PWM_MIN_VALUE (4 mA), pulse-doors close, every output is gated
  // off (firmware), and the hardware safety relay de-energizes the
  // output rail (independent of firmware).
  bool   estop_active    = 22;
  uint32 ro_bits         = 23;  // Settings.RemoteOff[] nibbles, debug
  // Live static-pressure reading (newer-AS2 port, 2026-06-10), inches
  // water column, from the resolved STATIC_PRESS(11) sensor. FORCE-encoded
  // via emit_float_force: 0.0 "wc (fan off / unrestricted plenum) is a
  // valid live reading and must not be proto3-suppressed, else the UI
  // readout blanks exactly when the true value is 0.0 (zero-suppression
  // invariant). Renders "--" only when no static-pressure sensor is
  // resolved (firmware skips the field entirely in that case).
  float  static_pressure = 24;
}

// ─── DateTime (UI_SendDateTime, tag "Date") ──────────────────────────────
message DateTime {
  string date_str  = 1;   // "MM/DD/YYYY" or "DD/MM/YYYY"
  string time_str  = 2;   // "HH:MM:SS"
  uint32 am_pm     = 3;   // 0=24h, 1=AM, 2=PM
}

// ─── NetworkConfig — LAN configuration + identity (envelope tag 19) ──────
// Pushed on link change / settings save. Replaces legacy CGI_IPADD,
// CGI_IPMASK, CGI_IPGATEWAY, CGI_IPDMODE, CGI_HTTPPORT, CGI_MAC.
message NetworkConfig {
  string ip_addr    = 1;   // Local IPv4 address
  string ip_mask    = 2;   // Subnet mask
  string ip_gateway = 3;   // Default gateway
  uint32 ip_mode    = 4;   // 0=DHCP, 1=Static
  uint32 http_port  = 5;   // HTTP server port
  string mac        = 6;   // NIC MAC address (read-only)
  // Public-facing IPv4 the panel advertises (used by multi-panel
  // discovery + email reports). Stored verbatim as 4 dotted octets.
  string public_ip  = 7;
  // Up to two static DNS servers. Empty when ip_mode=DHCP. Indices
  // are positional (entries[0]=DNS1, entries[1]=DNS2).
  repeated string dns = 8;
}

// ─── BasicSetup (UI_SendBasicSetup, tag "StorageName") ───────────────────
// General system configuration. Sent on connect and after changes.
message BasicSetup {
  string     storage_name  = 1;   // User-defined panel name
  TempUnit   temp_type     = 2;   // Fahrenheit or Celsius
  uint32     mode          = 3;   // Control mode index
  string     home_page     = 4;   // Default home page
  SystemMode system_mode   = 5;   // Potato vs Onion
  uint32     language       = 6;
  string     master_ip     = 7;   // Master panel IP (multi-panel)
  uint32     multi_view    = 8;   // Multi-view enabled
  string     login_pw      = 9;   // Login password hash
  uint32     local_login   = 10;  // Require local login
  uint32     animations    = 11;  // UI animations enabled
  uint32     net_monitor_enabled = 12; // Network monitor / cloud telemetry enabled
}

// ─── Version information (UI_SendVersions, tag "SysVersions") ────────────
message VersionInfo {
  string arm_version          = 1;   // Main firmware version
  string bootloader_version   = 2;   // Bootloader version
  repeated BoardVersion boards = 3;  // Connected board versions
}

message BoardVersion {
  uint32 address = 1;
  string version = 2;
  uint32 type    = 3;
}

// ─── Service/dealer info (UI_SendService, tag "dealerName") ──────────────
// Wire layout matches firmware NovaMsg_SendServiceInfo (nova_messages.c):
// pb_string(1)=DealerName, (2)=DealerPhone, (3)=TechName, (4)=TechPhone.
message ServiceInfo {
  string dealer_name  = 1;
  string dealer_phone = 2;
  string tech_name    = 3;
  string tech_phone   = 4;
}
