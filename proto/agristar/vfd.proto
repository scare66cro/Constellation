// ═══════════════════════════════════════════════════════════════════════════
// vfd.proto — VFD (Variable Frequency Drive) status, bridge-emitted.
//
// The bridge owns Modbus communication with VFDs (`vfdClient.ts`). These
// messages are NOT carried over the Nova UART — they are emitted directly
// by the bridge onto the /proto/stream WebSocket using bridge-reserved
// envelope tags 200-209.
//
// This keeps a single typed transport for the UI: every store consumes
// proto messages, regardless of whether the source is Nova firmware or
// the bridge itself.
// ═══════════════════════════════════════════════════════════════════════════
syntax = "proto3";
package agristar;

// ─── Per-drive status snapshot ───────────────────────────────────────────
//
// Field numbers 1-10 are the original "alarm-only" subset retained for
// backward compatibility. Fields 11+ extend the message to carry the full
// snapshot the UI's level2/fans page renders, eliminating the need for
// the legacy 5 s `/vfd/fans` HTTP poll.
//
// Units mirror `VFDDriveSnapshot` in `constellation-ui/server/src/vfdClient.ts`
// (e.g. *_a_x100 = amps × 100, *_hz_x10 = Hz × 10) so that a) integers
// keep the wire payload small and b) ts-proto consumers don't need to
// know the scaling — formatting happens in the UI.
message VfdDrive {
  uint32 address       = 1;   // Modbus unit address (alias of unit_id)
  string label         = 2;   // User-assigned name
  uint32 connected     = 3;   // 1 if responding to Modbus polls
  uint32 running       = 4;   // 1 if drive reports running
  uint32 fault_active  = 5;   // 1 if any fault bit set
  uint32 fault_code    = 6;   // Vendor fault code (0 if none)
  string fault_text    = 7;   // Human-readable fault description
  float  speed_hz      = 8;   // Current output frequency (Hz, float for legacy)
  float  current_a     = 9;   // Output current (amps, float for legacy)
  float  bus_voltage   = 10;  // DC bus voltage (V, float for legacy)

  // ── Extended snapshot fields (mirror VFDDriveSnapshot) ────────────────
  string manufacturer        = 11;  // 'abb-acs310' | 'abb-acs380' | 'phase-tech-dxl' | 'generic'
  uint32 control_word        = 12;
  uint32 speed_ref_percent   = 13;  // 0-10000 (0.00-100.00%)
  uint32 status_word         = 14;
  uint32 actual_speed_percent= 15;  // 0-10000
  uint32 output_freq_hz_x10  = 16;  // Hz × 10
  uint32 freq_ref_hz_x10     = 17;  // Hz × 10
  uint32 motor_speed_rpm     = 18;
  uint32 motor_current_a_x100= 19;  // A × 100
  uint32 motor_torque_pct_x100=20;  // % × 100
  uint32 motor_power_kw_x100 = 21;  // kW × 100
  uint32 output_voltage_x10  = 22;  // V × 10
  uint32 drive_temp_x10      = 23;  // °C × 10
  uint32 min_freq_hz_x10     = 24;  // Hz × 10
  uint32 max_freq_hz_x10     = 25;  // Hz × 10
  uint32 ramp_up_time_x10    = 26;  // s × 10
  uint32 ramp_down_time_x10  = 27;  // s × 10
  uint32 rated_current_a_x100= 28;  // A × 100
  uint32 rated_voltage       = 29;  // V
  uint32 rated_freq_hz_x10   = 30;  // Hz × 10
  uint32 rated_speed_rpm     = 31;
  uint32 rated_power_kw_x100 = 32;  // kW × 100
  uint32 at_reference        = 33;  // 1 if speed at reference
  uint32 direction           = 34;  // 0=FWD, 1=REV
}

// ─── VFD subsystem snapshot (envelope tag 200) ───────────────────────────
// Bridge emits whenever any drive's state changes. Replaces legacy CGI
// VfdAlarmData / VfdFailureActive (rows 92-93 in the audit).
message VfdStatus {
  repeated VfdDrive drives = 1;
  uint32 any_fault         = 2;   // 1 if any drive has fault_active
}
