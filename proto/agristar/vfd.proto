// ═══════════════════════════════════════════════════════════════════════════
// vfd.proto — VFD (Variable Frequency Drive) status, bridge-emitted.
//
// The bridge owns Modbus communication with VFDs (`vfdClient.ts`). These
// messages are NOT carried over the Nova UART — they are emitted directly
// by the bridge onto the /proto/stream WebSocket using bridge-reserved
// envelope tags 200-209.
//
// This keeps a single typed transport for the UI: every store consumes
// proto messages, regardless of whether the source is Nova firmware or
// the bridge itself.
// ═══════════════════════════════════════════════════════════════════════════
syntax = "proto3";
package agristar;

// ─── Per-drive status snapshot ───────────────────────────────────────────
//
// Field numbers 1-10 are the original "alarm-only" subset retained for
// backward compatibility. Fields 11+ extend the message to carry the full
// snapshot the UI's level2/fans page renders, eliminating the need for
// the legacy 5 s `/vfd/fans` HTTP poll.
//
// Units mirror `VFDDriveSnapshot` in `constellation-ui/server/src/vfdClient.ts`
// (e.g. *_a_x100 = amps × 100, *_hz_x10 = Hz × 10) so that a) integers
// keep the wire payload small and b) ts-proto consumers don't need to
// know the scaling — formatting happens in the UI.
message VfdDrive {
  uint32 address       = 1;   // Modbus unit address (alias of unit_id)
  string label         = 2;   // User-assigned name
  uint32 connected     = 3;   // 1 if responding to Modbus polls
  uint32 running       = 4;   // 1 if drive reports running
  uint32 fault_active  = 5;   // 1 if any fault bit set
  uint32 fault_code    = 6;   // Vendor fault code (0 if none)
  string fault_text    = 7;   // Human-readable fault description
  float  speed_hz      = 8;   // Current output frequency (Hz, float for legacy)
  float  current_a     = 9;   // Output current (amps, float for legacy)
  float  bus_voltage   = 10;  // DC bus voltage (V, float for legacy)

  // ── Extended snapshot fields (mirror VFDDriveSnapshot) ────────────────
  string manufacturer        = 11;  // 'abb-acs310' | 'abb-acs380' | 'phase-tech-dxl' | 'generic'
  uint32 control_word        = 12;
  uint32 speed_ref_percent   = 13;  // 0-10000 (0.00-100.00%)
  uint32 status_word         = 14;
  uint32 actual_speed_percent= 15;  // 0-10000
  uint32 output_freq_hz_x10  = 16;  // Hz × 10
  uint32 freq_ref_hz_x10     = 17;  // Hz × 10
  uint32 motor_speed_rpm     = 18;
  uint32 motor_current_a_x100= 19;  // A × 100
  uint32 motor_torque_pct_x100=20;  // % × 100
  uint32 motor_power_kw_x100 = 21;  // kW × 100
  uint32 output_voltage_x10  = 22;  // V × 10
  uint32 drive_temp_x10      = 23;  // °C × 10
  uint32 min_freq_hz_x10     = 24;  // Hz × 10
  uint32 max_freq_hz_x10     = 25;  // Hz × 10
  uint32 ramp_up_time_x10    = 26;  // s × 10
  uint32 ramp_down_time_x10  = 27;  // s × 10
  uint32 rated_current_a_x100= 28;  // A × 100
  uint32 rated_voltage       = 29;  // V
  uint32 rated_freq_hz_x10   = 30;  // Hz × 10
  uint32 rated_speed_rpm     = 31;
  uint32 rated_power_kw_x100 = 32;  // kW × 100
  uint32 at_reference        = 33;  // 1 if speed at reference
  uint32 direction           = 34;  // 0=FWD, 1=REV
}

// ─── VFD subsystem snapshot (envelope tag 200) ───────────────────────────
// Bridge emits whenever any drive's state changes. Replaces legacy CGI
// VfdAlarmData / VfdFailureActive (rows 92-93 in the audit).
message VfdStatus {
  repeated VfdDrive drives = 1;
  uint32 any_fault         = 2;   // 1 if any drive has fault_active
}

// ═════════════════════════════════════════════════════════════════════════
// Phase 4b Sub-phase 3 (2026-06-01): Nova owns the Modbus TCP master for
// VFD comms. Production UART airgap means the Pi5 can't reach the
// equipment-LAN VFD adapter (FENA-01) any more; Nova polls and writes,
// bridge consumes raw HR banks + sends raw HR writes. The bridge keeps
// the manufacturer-aware decode (vfdRegisterMaps.ts) — the wire stays
// register-level so growth in the manufacturer table costs zero firmware
// work. VfdStatus (above) is still bridge-emitted onto the WS, sourced
// from the decoded VfdRegBank cache.
// ═════════════════════════════════════════════════════════════════════════

// ─── VfdConfig — Bridge → Nova (envelope tag 127) ─────────────────────────
// Sent at bridge startup (and on every operator-config change) to tell
// Nova which VFD endpoint to talk to and which unit IDs to scan. Nova
// persists to OSPI in `LpSettings.vfd_*` so the config survives the
// next boot without a bridge round-trip.
//
// Use pb_uint32_force for every field on the encoder side: an empty IP
// (vfd_host_ipv4 = 0) is a meaningful "disable VFD polling" command,
// and `max_scan_unit_id = 0` means "disable auto-scan".
message VfdConfig {
  uint32 vfd_host_ipv4   = 1;  // Packed IPv4 (big-endian: a.b.c.d → 0xAABBCCDD).
                                // 0 → disabled (Nova tears down the task).
  uint32 vfd_port        = 2;  // Modbus TCP port (502 for FENA-01, 5020 for sim).
  uint32 max_scan_unit_id = 3; // Auto-scan unit IDs 1..N (default 8, max 247).
  uint32 poll_interval_ms = 4; // Per-drive poll cadence in ms (default 1000).
}

// ─── VfdRegBank — Nova → Bridge (envelope tag 128) ─────────────────────────
// Mirror of OrbitSensorBank for VFDs: raw HR pass-through, keyed by
// `(unit_id, hr_base)`. Nova emits one bank per (unit, register group)
// per poll cycle when the drive is online. The bridge decodes via
// `vfdRegisterMaps.ts` per the cached manufacturer profile.
//
// Use pb_uint32_force for `unit_id`, `hr_base`, and the repeated `values`
// on the encoder side: 0 is a valid unit ID, a valid register address,
// and a valid HR reading.
message VfdRegBank {
  uint32 unit_id  = 1;   // Modbus unit address (1..247)
  uint32 hr_base  = 2;   // First HR address in this bank
  // Raw uint16 readings; the bridge applies manufacturer-specific decode.
  // Use pb_uint32_force — 0 is a valid reading.
  repeated uint32 values = 3;
  uint32 seq      = 4;   // Per-bank monotonic sequence (rolls at 2^32)
  uint32 online   = 5;   // 1 if this bank was just freshly read, 0 if cached
                          // (use pb_uint32_force — 0 is meaningful)
}

// ─── VfdRawWrite — Bridge → Nova (envelope tag 129) ────────────────────────
// Generalised Modbus HR write for VFDs. Nova picks FC06 when
// `values.length == 1` else FC16. Bridge composes the manufacturer-
// specific value (e.g. ACS310 start CW = 0x047F) before sending; Nova
// stays manufacturer-agnostic and just relays bytes.
//
// Same force-encoding rules as `OrbitRegWrite`: 0 is a valid unit_id,
// addr, and value.
message VfdRawWrite {
  uint32 unit_id        = 1;
  uint32 addr           = 2;   // First Modbus HR address
  repeated uint32 values = 3;  // 1 entry → FC06; ≥2 entries → FC16
}
