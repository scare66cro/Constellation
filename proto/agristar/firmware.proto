// ═══════════════════════════════════════════════════════════════════════════
// firmware.proto — Firmware update protocol for Constellation Nova
//
// Architecture: Dual-bank flash with golden recovery image.
//   OSPI flash (8 MB) layout:
//     0x000000 - 0x00FFFF  Boot header + bank metadata (64 KB)
//     0x010000 - 0x1FFFFF  Bank A firmware image (~2 MB)
//     0x200000 - 0x3FFFFF  Bank B firmware image (~2 MB)
//     0x400000 - 0x5FFFFF  Golden recovery image (~2 MB, write-once)
//     0x600000 - 0x7FFFFF  Settings vault (~2 MB)
//
// Update flow:
//   1. Bridge sends FwBeginUpdate (total_size, crc32, version_string)
//   2. Firmware ACKs if ready (enough flash space, not already updating)
//   3. Bridge sends FwDataChunk messages (offset, data, chunk_crc)
//   4. Firmware writes each chunk to the INACTIVE bank, ACKs each
//   5. Bridge sends FwFinalizeUpdate after all chunks sent
//   6. Firmware verifies full-image CRC, writes bank header, ACKs
//   7. Bridge sends FwActivateBank to swap active bank + reboot
//   8. On reboot, bootloader validates active bank → boots it
//   9. If boot fails (watchdog), bootloader falls back to other bank
//      or golden image
//
// Recovery: The golden image is flashed once at manufacturing and never
// overwritten. If both banks are corrupted, the bootloader loads golden.
// ═══════════════════════════════════════════════════════════════════════════
syntax = "proto3";
package agristar;

// ─── FwBeginUpdate — Bridge → Firmware: start an update session ──────────
// Firmware erases the inactive bank and prepares to receive chunks.
//
// Hardening (2026-05-20, OTA Gap 1-LP / Gap 2-LP):
//   - expected_role / allow_downgrade let the LP fail-fast in BEGIN
//     before the ~5 s Bank-B erase, instead of having to rely on
//     the bridge alone for these checks.
message FwBeginUpdate {
  uint32 total_size      = 1;   // Total firmware image size in bytes
  uint32 crc32           = 2;   // CRC-32 of the complete image
  string version         = 3;   // Version string (e.g. "0.A.187+abc1234")
  uint32 chunk_size      = 4;   // Negotiated chunk size (default 1024)
  uint32 expected_role   = 5;   // OrbitRole the bundle expects this LP to be.
                                // 0 (CONTROLLER) is a real role, but proto3 zero-
                                // suppression means "field absent" is indistinguishable
                                // from CONTROLLER on the wire — so the bridge MUST send
                                // this as a forced varint (pb_uint32_force) whenever
                                // role-checking is desired. If absent, LP skips the role
                                // gate (back-compat with older bridges).
  bool   allow_downgrade = 6;   // Bridge has explicitly opted into a downgrade.
                                // If false (default), LP rejects an image whose
                                // 0.A.<N> integer is < running LP_FW_VERSION's N.
}

// ─── FwDataChunk — Bridge → Firmware: one chunk of firmware data ─────────
// Chunks are sent sequentially. offset must be monotonically increasing.
message FwDataChunk {
  uint32 offset    = 1;   // Byte offset within the image
  bytes  data      = 2;   // Chunk payload (up to chunk_size bytes)
  uint32 chunk_crc = 3;   // CRC-32 of this chunk's data field
}

// ─── FwFinalizeUpdate — Bridge → Firmware: all chunks sent ───────────────
// Firmware verifies the full image CRC matches FwBeginUpdate.crc32.
message FwFinalizeUpdate {
  uint32 crc32   = 1;   // Same CRC from FwBeginUpdate (for confirmation)
}

// ─── FwActivateBank — Bridge → Firmware: swap active bank + reboot ───────
// Only valid after a successful FwFinalizeUpdate.
message FwActivateBank {
  bool reboot = 1;   // true = reboot immediately after activation
}

// ─── FwUpdateStatus — Firmware → Bridge: update progress/result ──────────
// Sent after each FwDataChunk and on state transitions.
message FwUpdateStatus {
  FwUpdateState state          = 1;
  uint32        bytes_written  = 2;   // Total bytes written so far
  uint32        total_size     = 3;   // Total expected size
  uint32        error_code     = 4;   // 0 = no error
  string        error_message  = 5;   // Human-readable error text
  string        active_version = 6;   // Currently running firmware version
  string        staged_version = 7;   // Version in inactive bank (if any)
  FwBankId      active_bank    = 8;   // Which bank is currently active
}

enum FwUpdateState {
  FW_IDLE          = 0;   // No update in progress
  FW_ERASING       = 1;   // Erasing inactive bank
  FW_RECEIVING     = 2;   // Receiving and writing chunks
  FW_VERIFYING     = 3;   // Verifying full-image CRC
  FW_VERIFIED      = 4;   // Image verified, ready to activate
  FW_ACTIVATING    = 5;   // Writing bank header + rebooting
  FW_ERROR         = 6;   // Update failed (see error_code/message)
}

enum FwBankId {
  FW_BANK_A       = 0;
  FW_BANK_B       = 1;
  FW_BANK_GOLDEN  = 2;   // Recovery image
}

// ─── FwBankInfo — Firmware → Bridge: boot/bank status on connect ─────────
// Sent once after handshake so the bridge knows the current state.
message FwBankInfo {
  FwBankId active_bank     = 1;
  string   bank_a_version  = 2;
  uint32   bank_a_crc      = 3;
  bool     bank_a_valid    = 4;
  string   bank_b_version  = 5;
  uint32   bank_b_crc      = 6;
  bool     bank_b_valid    = 7;
  string   golden_version  = 8;
  uint32   boot_count      = 9;   // Incremented each boot
  uint32   boot_reason     = 10;  // 0=normal, 1=watchdog, 2=fallback
  uint32   current_role    = 11;  // OrbitRole this LP is provisioned as
                                  // (from lp_device_config). Added 2026-05-20
                                  // for OTA Gap 1: bridge cross-checks manifest
                                  // role against this before sending FwBeginUpdate.
                                  // MUST be force-encoded by LP because 0
                                  // (CONTROLLER) is a valid value. Older firmwares
                                  // that don't emit this field → bridge treats
                                  // "unknown role" and falls through to relying on
                                  // LP-side FwBeginUpdate.expected_role gate.
  uint32   watchdog_strikes = 12;  // Consecutive failed-boot strike count read
                                   // from FwBootMeta. Added 2026-05-30 for F2c
                                   // Session 1 diagnostics. The watchdog client
                                   // clears this once the boot has sustained all
                                   // required alive bits for 30 s; the (future)
                                   // F2c SBL chooser uses ≥3 to fall back to the
                                   // previous bank. MUST be force-encoded by LP
                                   // because 0 is the healthy-boot value and
                                   // proto3 zero-suppression would otherwise hide it.
}

// ═══════════════════════════════════════════════════════════════════════════
// Pi5 ↔ Nova install-orchestration layer (UART airgap migration, Phase 2)
//
// The messages above (FwBeginUpdate / FwDataChunk / FwFinalizeUpdate /
// FwActivateBank / FwUpdateStatus / FwBankInfo) are the LP-level wire
// protocol. In the production UART-airgap architecture (see
// docs/uart-airgap-architecture.md and CLAUDE.md invariant #12), the Pi5
// has NO IP route to the orbit LPs. Instead, the Pi5 hands the .cfu
// bundle's contents to Nova over UART using the FwInstall* messages
// defined below, and Nova brokers per-component pushes to the orbit LPs
// over CPSW using the LP-level protocol above.
//
// State machine (Pi5 → Nova):
//   FwInstallBegin
//   [ FwInstallComponentBegin
//     FwInstallChunk*            -- streamed at UART line rate
//     FwInstallComponentFinalize
//   ]+
//   FwInstallComplete
//
// At any point Pi5 may send FwInstallAbort to cancel.
//
// Nova → Pi5 emits FwInstallProgress envelopes on every state transition
// and periodically while pushing (cadence: every ~5% of component bytes
// to keep UART back-direction duty cycle low). After FwInstallComplete
// (or FwInstallAbort cleanup) Nova sends FwInstallResult with the
// per-component terminal summary.
//
// Routing model: Nova routes each component to its destination by
// **role**, not slot. Nova knows its own role from OSPI device-config;
// role-matching the controller component → Nova self-updates its own
// inactive bank. Role-matching an orbit component → Nova opens TCP to
// the LP whose FwBankInfo.current_role matches and runs the existing
// orbitOtaPush state machine against it. This means the Pi5 stays
// agnostic of physical IP assignments and dipswitch ordering.
//
// Memory model: Nova never buffers a full component image. Chunks flow
// Pi5 → UART → Nova → TCP → LP without intermediate storage beyond
// the in-flight chunk. Pi5 streams chunks open-loop at UART line rate;
// Nova's TCP-to-LP path drains faster than the UART supplies them so
// no flow-control envelope is needed.
//
// Install mode: FwInstallBegin causes Nova to drop non-essential tasks
// (sensor polling, equipment loops, settings broadcasts) until
// FwInstallComplete or FwInstallAbort. This frees CPU and avoids
// envelope contention on the UART during the install.
// ═══════════════════════════════════════════════════════════════════════════

// ─── FwInstallComponentState ─────────────────────────────────────────────
// Per-component state as seen by Pi5. Coarser than the LP-level
// FwUpdateState because it bundles Nova-side routing/probe phases too.
enum FwInstallComponentState {
  FW_INSTALL_PENDING      = 0;   // queued, not started
  FW_INSTALL_BEGIN        = 1;   // FwBeginUpdate sent to target LP / self
  FW_INSTALL_ERASING      = 2;   // inactive bank erase in progress (~5 s)
  FW_INSTALL_PUSHING      = 3;   // streaming chunks
  FW_INSTALL_VERIFYING    = 4;   // LP CRC-verifying full image
  FW_INSTALL_ACTIVATING   = 5;   // FwActivateBank sent
  FW_INSTALL_REBOOTING    = 6;   // target warm-resetting, awaiting return
  FW_INSTALL_CONFIRMED    = 7;   // post-reboot version matches expected
  FW_INSTALL_DONE         = 8;   // terminal success
  FW_INSTALL_SKIPPED      = 9;   // intentionally not run (Phase-2 component)
  FW_INSTALL_FAILED       = 10;  // terminal failure (see error_code)
}

enum FwInstallOverallState {
  FW_INSTALL_OVERALL_IDLE        = 0;
  FW_INSTALL_OVERALL_PROBING     = 1;   // fleet probe in progress
  FW_INSTALL_OVERALL_INSTALLING  = 2;
  FW_INSTALL_OVERALL_DONE        = 3;
  FW_INSTALL_OVERALL_FAILED      = 4;
  FW_INSTALL_OVERALL_ABORTED     = 5;
}

// ─── FwInstallBegin — Pi5 → Nova: start a bundle install ────────────────
// Nova enters install mode (suspends non-essential tasks), validates the
// manifest digest, and prepares to receive component data.
message FwInstallBegin {
  string bundle_version    = 1;   // manifest "version" string
  bytes  manifest_sha256   = 2;   // 32-byte digest of the manifest blob
  uint32 component_count   = 3;   // how many FwInstallComponentBegin will follow
  uint32 chunk_size        = 4;   // hint for Pi5's chunk sizing; 0 = default 1024.
                                  // Nova uses this for its TCP-side chunk size too.
  bool   allow_downgrade   = 5;   // applies to ALL components in the bundle
}

// ─── FwInstallComponentBegin — Pi5 → Nova: start one component push ─────
// Nova resolves the destination by `role` (its own OSPI current_role for
// self-update, or fleet lookup for orbit components) and issues LP-level
// FwBeginUpdate. Reports back via FwInstallProgress(state=BEGIN | ERASING
// | FAILED).
message FwInstallComponentBegin {
  string component_name    = 1;   // manifest key (e.g. "storage", "controller")
  uint32 component_index   = 2;   // 0..component_count-1, monotonic.
                                  // Force-encode — 0 is the first component.
  uint32 role              = 3;   // OrbitRole target. Force-encode —
                                  // 0 (CONTROLLER) is a valid value.
                                  // See CLAUDE.md invariant #1.
  uint32 total_size        = 4;   // bytes for THIS component image
  bytes  image_sha256      = 5;   // 32-byte digest of the component image
  string expected_version  = 6;   // for audit logging; LP gates by its
                                  // own running-version comparison
}

// ─── FwInstallChunk — Pi5 → Nova: one chunk of the current component ────
// Streamed back-to-back at UART line rate. Nova forwards bytes to the
// target LP via FwDataChunk (or writes locally for the controller
// component). offset must be monotonically increasing within a component.
message FwInstallChunk {
  uint32 component_index   = 1;   // which component this chunk belongs to.
                                  // Force-encode — 0 is the first component.
  uint32 offset            = 2;   // byte offset within the component.
                                  // Force-encode — 0 is the first chunk.
  bytes  data              = 3;   // chunk payload (up to chunk_size bytes).
                                  // pb_callback_t on the C side — never
                                  // statically allocated.
}

// ─── FwInstallComponentFinalize — Pi5 → Nova: all chunks for one comp ───
// Nova sends LP-level FwFinalizeUpdate, awaits verify, then
// FwActivateBank(reboot=true), then post-reboot version probe.
// Terminal state is reported via FwInstallProgress(state=DONE | FAILED).
message FwInstallComponentFinalize {
  uint32 component_index   = 1;   // force-encode
  bytes  image_sha256      = 2;   // confirmation — must match Begin's digest
}

// ─── FwInstallComplete — Pi5 → Nova: bundle install finished ────────────
// All FwInstallComponentBegin/Finalize pairs have been sent. Nova exits
// install mode (resumes normal operation) and emits FwInstallResult.
message FwInstallComplete {
}

// ─── FwInstallAbort — Pi5 → Nova: cancel the install ────────────────────
// Nova best-effort closes any in-flight LP socket, leaves inactive banks
// as-is (LPs will not boot an unfinalized bank), and emits FwInstallResult
// with overall=ABORTED. Does NOT roll back already-activated components
// — once a component reboots into its new image that's a commit point.
message FwInstallAbort {
  string reason            = 1;
}

// ─── FwInstallProgress — Nova → Pi5: state update ───────────────────────
// Emitted on every state transition and periodically while PUSHING
// (target cadence: every ~5% of component bytes). The Pi5 uses this for
// UI updates only — chunk streaming is open-loop, not gated on progress.
message FwInstallProgress {
  uint32                  component_index = 1;   // force-encode
  string                  component_name  = 2;
  string                  target_host     = 3;   // resolved IP, or "self"
                                                 // for the controller path
  FwInstallComponentState state           = 4;
  uint32                  bytes_written   = 5;
  uint32                  total_size      = 6;
  uint32                  error_code      = 7;   // 0 = no error
  string                  error_message   = 8;
  FwInstallOverallState   overall         = 9;
}

// ─── FwInstallResult — Nova → Pi5: terminal bundle result ───────────────
// Sent after FwInstallComplete (or after FwInstallAbort cleanup). Carries
// the per-component terminal summary so the UI can present a final
// per-component success/fail table without replaying progress history.
message FwInstallResult {
  FwInstallOverallState              overall        = 1;
  string                             failure_reason = 2;   // first failing component's reason
  repeated FwInstallComponentResult  components     = 3;
}

message FwInstallComponentResult {
  uint32                  component_index      = 1;   // force-encode
  string                  component_name       = 2;
  string                  target_host          = 3;
  FwInstallComponentState state                = 4;   // terminal state
  uint32                  error_code           = 5;
  string                  error_message        = 6;
  string                  post_install_version = 7;   // version LP reports post-reboot
}

// ─── FwFleetProbe — Pi5 → Nova: probe orbit fleet, report ───────────────
// Optional pre-flight before FwInstallBegin so the UI can show "boards I
// see" and warn on missing/legacy/unreachable hosts. Nova probes every
// known orbit IP (dipswitch-derived discovery TBD) in parallel and
// returns FwFleetSnapshot.
message FwFleetProbe {
  uint32 timeout_ms        = 1;   // 0 = use default (~300 ms per host)
}

// ─── FwFleetSnapshot — Nova → Pi5: result of FwFleetProbe ───────────────
message FwFleetSnapshot {
  repeated FwFleetMember members = 1;
}

message FwFleetMember {
  string   host             = 1;   // e.g. "10.47.27.2"
  bool     reachable        = 2;
  uint32   current_role     = 3;   // OrbitRole — force-encode (0 = CONTROLLER)
  string   active_version   = 4;
  FwBankId active_bank      = 5;
  bool     bank_a_valid     = 6;
  bool     bank_b_valid     = 7;
  uint32   boot_count       = 8;
  string   error            = 9;   // populated when reachable=false
}
