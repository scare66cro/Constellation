# UART-uniflash recovery config — FULL ERASE then re-flash everything.
# Used after a previous recovery flashed but the chip won't boot from OSPI,
# typically because stale/corrupt data in flash conflicts with the new SBL
# (or the chip's flash-NV registers were set non-default by app code).
#
# Run:
#   1. Set DIPs to UART boot (1,2,3 ON others OFF)
#   2. Power-cycle LP
#   3. python uart_uniflash.py -p COM4 --cfg=nova_uart_uniflash.cfg

# Flash-writer (loaded into MSRAM via UART XMODEM)
--flash-writer=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_uart_uniflash.release.hs_fs.tiimage

# Step 1: ERASE 16 MB starting at 0x0 (covers SBL, app, bank B, headers, dev cfg)
--operation=erase --flash-offset=0x0 --erase-size=0x1000000

# Step 2: PHY tuning region (pristine)
--operation=flash-phy-tuning-data

# Step 3: SBL multi-partition (debug variant for verbose boot trace)
--file=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_ospi_multi_partition.debug.hs_fs.tiimage --operation=flash --flash-offset=0x0

# Step 4: 0.A.108 nova firmware (CONTROLLER role, IP 10.47.27.1)
--file=F:/Constellation/Nova_Firmware/lp_am2434/ti-arm-clang/nova_lp.release.mcelf.hs_fs --operation=flash --flash-offset=0x80000

# Step 5: watchdog (R5FSS1_0)
--file=F:/Constellation/Nova_Firmware/lp_am2434/ti-arm-clang/watchdog.release.mcelf.hs_fs --operation=flash --flash-offset=0x180000
