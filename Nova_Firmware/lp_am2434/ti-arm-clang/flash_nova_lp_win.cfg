# Flash SBL OSPI bootloader + Constellation Nova for LP-AM2434 (Windows dev box).
# Run from this directory (ti-arm-clang/) so nova_lp.release.mcelf.hs_fs resolves.
# Per-board role: rebuild via Flash-LP.ps1 -BuildOnly -Probe A|B before invoking.

--flash-writer=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_uart_uniflash.release.hs_fs.tiimage

# Program the OSPI PHY tuning attack vector (REQUIRED — without this the
# subsequent app boot asserts in Flash_norOspiPhyTune).
--operation=flash-phy-tuning-data

# Bootloader at offset 0x0
--file=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_ospi.release.hs_fs.tiimage --operation=flash --flash-offset=0x0

# Nova LP application at offset 0x80000 (relative — must be the freshly built
# per-role image in the same directory as this cfg).
--file=nova_lp.release.mcelf.hs_fs --operation=flash --flash-offset=0x80000
