# TRITON / Nova-on-TRITON-hardware commissioning.
#
# Re-flashes the SBL at 0x0 with TI's SINGLE-PARTITION `sbl_ospi`
# (not multi-partition). This is the simpler SBL that only loads ONE
# app at 0x80000 and ignores anything at 0x180000+. Eliminates the
# "Some tests have failed!!" trap caused by mismatched / corrupt
# secondary-core mcelfs.
#
# After running this, the chip is "freshly commissioned":
#   0x0       -> sbl_ospi (single-partition variant)
#   0x2000000 -> PHY tuning attack vector
#   0x80000   -> EMPTY (no app — flash Nova later via Flash-LP.ps1)
#
# Run via:
#   cd C:\ti\mcu_plus_sdk_am243x_12_00_00_26\tools\boot
#   & "F:\Constellation\.venv\Scripts\python.exe" uart_uniflash.py `
#     -p COM4 `
#     --cfg F:\Constellation\Nova_Firmware\lp_am2434\ti-arm-clang\flash_sbl_ospi_commission.cfg
#
# After SUCCESS, switch SW4 to OSPI-boot pattern; chip will boot SBL
# and then either print "Some tests have failed!!" (no app at 0x80000
# yet — that's EXPECTED here) or wait. Either way the next step is
# Flash-LP.ps1 -Probe T to write the Nova app.

--flash-writer=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_uart_uniflash.release.hs_fs.tiimage

--operation=flash-phy-tuning-data

--file=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_ospi.release.hs_fs.tiimage --operation=flash --flash-offset=0x0
