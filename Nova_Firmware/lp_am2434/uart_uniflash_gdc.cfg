# UART-uniflash recovery for GDC (Probe P / S24L0727 / 10.47.27.3).
# Full erase + recommission with F2c SBL chooser + GDC-baked nova app.
#
# Used 2026-06-01 to recover GDC after Bank A had a stale CONTROLLER image
# blocking JTAG MSRAM access (rogue-controller boot loop).
#
# Run:
#   1. SW4 on GDC LP → UART boot (DIP 1+2+3 ON, others OFF)
#   2. USB-cycle Probe P (unplug + replug Probe P's XDS110 USB cable)
#   3. python C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/uart_uniflash.py \
#        -p COM7 --cfg=F:/Constellation/Nova_Firmware/lp_am2434/uart_uniflash_gdc.cfg
#   4. After ~2 min, when uart_uniflash reports SUCCESS:
#      SW4 → OSPI boot (DIP 2+6 ON, others OFF); USB-cycle Probe P.
#   5. JTAG: Write-SeedMetaBlock.ps1 -Probe P (seed Bank A header valid).
#   6. system_reset.js to boot the new firmware.

# Flash-writer (loaded into MSRAM via UART XMODEM by the ROM bootloader)
--flash-writer=C:/ti/mcu_plus_sdk_am243x_12_00_00_26/tools/boot/sbl_prebuilt/am243x-lp/sbl_uart_uniflash.release.hs_fs.tiimage

# Step 1: ERASE 16 MB starting at 0x0 (covers SBL chooser, Bank A app,
# F2c chooser metadata at 0x300000/0x310000, watchdog, dev-config at 0x600000,
# Bank B at 0x900000, GOLDEN at 0xc00000). Brings the entire user-flash
# region to all-0xFF so the new layout writes don't collide with stale data.
--operation=erase --flash-offset=0x0 --erase-size=0x1000000

# Step 2: PHY tuning attack-vector (128 bytes at 0x2000000). Required for
# OSPI PHY-mode high-speed reads. See lp-am2434-ospi-boot-missing-phy-tuning.md.
--operation=flash-phy-tuning-data

# Step 3: F2c SBL chooser at 0x0. Replaces TI's stock SBL with our
# bank-aware bootloader so the F2c rollback safety net works.
--file=F:/Constellation/Nova_Firmware/lp_am2434/sbl_chooser/r5fss0-0_nortos/ti-arm-clang/sbl_chooser.release.hs_fs.tiimage --operation=flash --flash-offset=0x0

# Step 4: Nova app (Bank A) — currently baked for GDC role=2, IP=10.47.27.3
# from the Flash-LP.ps1 build at 07:39 today. The compile-time override block
# in lp_device_config.c will write OSPI device-config on first boot.
--file=F:/Constellation/Nova_Firmware/lp_am2434/ti-arm-clang/nova_lp.release.mcelf.hs_fs --operation=flash --flash-offset=0x80000
